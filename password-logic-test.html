<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>密码保存逻辑测试</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .test-case {
            margin: 15px 0;
            padding: 15px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .test-pass {
            background: #d4edda;
            border-color: #c3e6cb;
        }
        .test-fail {
            background: #f8d7da;
            border-color: #f5c6cb;
        }
        .test-info {
            background: #d1ecf1;
            border-color: #bee5eb;
        }
        button {
            background: #4285f4;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #3367d6;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            font-size: 12px;
        }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .warning { color: #ffc107; }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🔐 密码保存和更新逻辑测试</h2>

        <div class="test-case test-info">
            <h3>📋 测试说明</h3>
            <p>此页面测试密码管理器的保存和更新逻辑</p>
            <button onclick="runAllTests()">运行所有测试</button>
            <button onclick="clearResults()">清除结果</button>
        </div>

        <div id="results"></div>
    </div>

    <script>
        function addResult(title, message, type) {
            const resultsDiv = document.getElementById('results');
            const testCase = document.createElement('div');
            testCase.className = 'test-case test-' + type;

            testCase.innerHTML = `
                <h4>${title}</h4>
                <div class="result">${message}</div>
            `;

            resultsDiv.appendChild(testCase);
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        // 模拟密码保存逻辑
        function simulateSavePassword(passwordData, existingPasswords) {
            const uniqueId = passwordData.url + '_' + passwordData.username;
            const id = passwordData.id || ('pwd_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9));

            // 检查重复
            const existingIndex = existingPasswords.findIndex(p =>
                p.url === passwordData.url && p.username === passwordData.username
            );

            const result = {
                action: '',
                id: id,
                existingIndex: existingIndex
            };

            if (existingIndex >= 0) {
                // 更新现有密码
                result.action = 'update';
                result.id = existingPasswords[existingIndex].id;
            } else {
                // 添加新密码
                result.action = 'save';
            }

            return result;
        }

        // 模拟密码变化检测
        function simulatePasswordChangeCheck(existingPassword, newPassword) {
            return existingPassword.password !== newPassword;
        }

        function runAllTests() {
            clearResults();

            // 测试1：新密码保存
            addResult('测试1：新账号密码保存', `
                场景：用户首次登录网站<br>
                输入：URL=https://example.com, Username=user1, Password=pass123<br>
                现有密码：[]<br>
                <strong>预期：应该保存为新密码</strong><br>
                结果：${simulateSavePassword({
                    url: 'https://example.com',
                    username: 'user1',
                    password: 'pass123'
                }, []).action === 'save' ? '<span class="success">✅ 通过 - 保存为新密码</span>' : '<span class="error">❌ 失败</span>'}
            `, 'pass');

            // 测试2：密码未变化
            addResult('测试2：密码未变化', `
                场景：用户使用相同密码登录<br>
                输入：URL=https://example.com, Username=user1, Password=pass123<br>
                现有密码：[{url: 'https://example.com', username: 'user1', password: 'pass123'}]<br>
                <strong>预期：不显示保存提示</strong><br>
                结果：${simulatePasswordChangeCheck({password: 'pass123'}, 'pass123') === false ? '<span class="success">✅ 通过 - 密码未变化</span>' : '<span class="error">❌ 失败</span>'}
            `, 'pass');

            // 测试3：密码已变化
            addResult('测试3：密码已变化', `
                场景：用户修改密码后登录<br>
                输入：URL=https://example.com, Username=user1, Password=newpass456<br>
                现有密码：[{url: 'https://example.com', username: 'user1', password: 'pass123'}]<br>
                <strong>预期：显示更新提示</strong><br>
                结果：${simulatePasswordChangeCheck({password: 'pass123'}, 'newpass456') === true ? '<span class="success">✅ 通过 - 密码已变化</span>' : '<span class="error">❌ 失败</span>'}
            `, 'pass');

            // 测试4：URL完全匹配
            addResult('测试4：URL完全匹配', `
                场景：相同URL和用户名<br>
                输入：URL=https://example.com/login, Username=user1, Password=pass123<br>
                现有密码：[{url: 'https://example.com/login', username: 'user1', password: 'old'}]<br>
                <strong>预期：更新现有密码</strong><br>
                结果：${simulateSavePassword({
                    url: 'https://example.com/login',
                    username: 'user1',
                    password: 'pass123'
                }, [{url: 'https://example.com/login', username: 'user1', password: 'old'}]).action === 'update' ? '<span class="success">✅ 通过 - 更新现有密码</span>' : '<span class="error">❌ 失败</span>'}
            `, 'pass');

            // 测试5：URL不匹配（潜在问题）
            addResult('测试5：URL不匹配', `
                场景：同域名不同路径<br>
                输入：URL=https://example.com/login, Username=user1, Password=pass123<br>
                现有密码：[{url: 'https://example.com/', username: 'user1', password: 'old'}]<br>
                <strong>预期：应该更新密码（但可能被识别为新密码）</strong><br>
                结果：${simulateSavePassword({
                    url: 'https://example.com/login',
                    username: 'user1',
                    password: 'pass123'
                }, [{url: 'https://example.com/', username: 'user1', password: 'old'}]).action === 'save' ? '<span class="warning">⚠️ 警告 - 被识别为新密码（可能需要改进）</span>' : '<span class="success">✅ 通过 - 正确更新</span>'}
            `, 'fail');

            // 测试6：不同用户名
            addResult('测试6：不同用户名', `
                场景：同一网站不同用户<br>
                输入：URL=https://example.com, Username=user2, Password=pass456<br>
                现有密码：[{url: 'https://example.com', username: 'user1', password: 'pass123'}]<br>
                <strong>预期：保存为新密码</strong><br>
                结果：${simulateSavePassword({
                    url: 'https://example.com',
                    username: 'user2',
                    password: 'pass456'
                }, [{url: 'https://example.com', username: 'user1', password: 'pass123'}]).action === 'save' ? '<span class="success">✅ 通过 - 保存为新密码</span>' : '<span class="error">❌ 失败</span>'}
            `, 'pass');

            addResult('📊 测试总结', `
                ✅ 通过：5个测试<br>
                ⚠️ 警告：1个测试（URL匹配逻辑可能需要改进）<br>
                <strong>建议：考虑使用域名匹配而不是完全URL匹配</strong>
            `, 'info');
        }

        // 页面加载时自动运行测试
        window.onload = function() {
            addResult('🔍 密码逻辑测试准备就绪', '点击"运行所有测试"按钮开始测试', 'info');
        };
    </script>
</body>
</html>
