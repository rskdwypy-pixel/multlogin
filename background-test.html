<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Background Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h2>🧪 Background Script Test</h2>

    <div id="results"></div>

    <script src="passwordManager.js"></script>
    <script>
        function addResult(message, type) {
            const div = document.createElement('div');
            div.className = 'test-result ' + type;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }

        // 测试1: 检查PasswordManager模块是否加载
        addResult('测试1: 检查PasswordManager模块加载...', 'info');
        if (typeof PasswordManager !== 'undefined') {
            addResult('✅ PasswordManager模块已加载', 'success');
        } else {
            addResult('❌ PasswordManager模块未加载', 'error');
        }

        // 测试2: 检查PasswordManager的API方法
        addResult('测试2: 检查PasswordManager API方法...', 'info');
        if (typeof PasswordManager !== 'undefined') {
            const methods = ['getAllPasswords', 'savePassword', 'deletePassword', 'findPasswordsByUrl', 'importFromCSV', 'exportToCSV', 'clearAllPasswords'];
            let allMethodsExist = true;
            methods.forEach(function(method) {
                if (typeof PasswordManager[method] !== 'function') {
                    addResult('❌ 方法缺失: ' + method, 'error');
                    allMethodsExist = false;
                }
            });
            if (allMethodsExist) {
                addResult('✅ 所有API方法都存在', 'success');
            }
        }

        // 测试3: 检查chrome.runtime API
        addResult('测试3: 检查chrome.runtime API...', 'info');
        if (typeof chrome !== 'undefined' && chrome.runtime) {
            addResult('✅ chrome.runtime API可用', 'success');
        } else {
            addResult('⚠️ chrome.runtime API不可用（在非Chrome环境中正常）', 'info');
        }

        // 测试4: 模拟getAllPasswords调用
        addResult('测试4: 测试getAllPasswords方法...', 'info');
        if (typeof PasswordManager !== 'undefined') {
            PasswordManager.getAllPasswords(function(passwords) {
                addResult('✅ getAllPasswords回调成功，返回 ' + passwords.length + ' 个密码', 'success');
            }, function(error) {
                addResult('❌ getAllPasswords失败: ' + error, 'error');
            });
        }

        addResult('测试完成！', 'info');
    </script>
</body>
</html>
